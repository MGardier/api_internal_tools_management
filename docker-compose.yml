services:
  # =============================================  
  # POSTGRESQL SERVICE - Stack PostgreSQL
  # =============================================
  postgres:
    image: postgres:15-alpine  
    container_name: internal-tools-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # Script d'initialisation (structure + données)
      - ./postgresql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      # Persistance données (optionnelle pour dev)
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal-tools-net  
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres
      - all

  # =============================================  
  # PGADMIN - Interface PostgreSQL
  # =============================================
  pgadmin:
    image: dpage/pgadmin4:7
    container_name: internal-tools-pgadmin  
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy  
    networks:
      - internal-tools-net
    profiles:
      - postgres
      - all

# =============================================
# VOLUMES & NETWORKS
# =============================================
volumes:
  postgres_data:  
    driver: local
  pgadmin_data:
    driver: local

networks:
  internal-tools-net:
    driver: bridge